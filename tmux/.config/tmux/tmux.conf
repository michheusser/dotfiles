# Plugins location (outside dotfiles repo)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'

## General
set -g mouse on
set-option -g default-shell $SHELL
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g focus-events on

## Status bar position
set-option -g status-position top

## Catppuccin flavor
set -g @catppuccin_flavor "mocha"

## Status bar
set -g @catppuccin_status_background "#11111b"

## Window style
set -g @catppuccin_window_status_style "rounded"

## Window text — full path
#set -g @catppuccin_window_text " #{pane_current_path}"
#set -g @catppuccin_window_current_text " #{pane_current_path}"
set -g @catppuccin_window_text " #{b:pane_current_path}"          # short path (basename only)
set -g @catppuccin_window_current_text " #{b:pane_current_path}"  # short path (basename only)

## Window flags (icons for zoomed, marked, silent windows)
set -g @catppuccin_window_flags "icon"

## Active window highlight color
set -g @catppuccin_window_current_number_color "#{@thm_lavender}"

## Pane borders
set -g @catppuccin_pane_status_enabled "yes"
set -g @catppuccin_pane_active_border_style "fg=#{@thm_lavender}"

## Status line lengths
set -g status-right-length 100
set -g status-left-length 100

## Status line modules
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_host}"
set -ag status-right "#{E:@catppuccin_status_user}"
set -ag status-right "#{E:@catppuccin_status_date_time}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"

## Date time format
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

## Load catppuccin (must come before TPM)
run ~/.tmux/plugins/catppuccin/tmux/catppuccin.tmux

## Copy mode
bind-key -T copy-mode-vi y send-keys -X copy-selection

## Splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

## Pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

## Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

## Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-cpu'

## Initialize TPM (always keep at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
