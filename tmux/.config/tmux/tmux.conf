# ── General ───────────────────────────────────────────────────────────────────
# Enable mouse (click to select panes, resize, scroll)
set -g mouse on

# True color support (required for Neovim themes to render correctly)
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"

# Focus events (required for Neovim autoread to work inside tmux)
set -g focus-events on

# ── Copy mode ─────────────────────────────────────────────────────────────────
# Use vim keybindings in copy mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Splits ────────────────────────────────────────────────────────────────────
# Split with | and - keeping current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Reload config ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# ── Plugins ───────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# ── Initialize TPM (always keep this at the very bottom) ──────────────────────
run '~/.tmux/plugins/tpm/tpm'
